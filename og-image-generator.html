<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolute Validator - OG Image</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1200px;
            height: 630px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a; /* Solid Slate 900 */
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }
        
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 80px 100px;
            position: relative;
        }
        
        /* Minimalist accent */
        .accent {
            position: absolute;
            top: 0;
            right: 0;
            width: 400px;
            height: 400px;
            background: #2563eb; /* Blue 600 */
            opacity: 0.1;
            filter: blur(100px);
        }
        
        /* Content */
        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 60px;
            position: relative;
            z-index: 1;
        }
        
        .icon {
            width: 96px;
            height: 96px;
            background: #2563eb;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .icon svg {
            width: 56px;
            height: 56px;
            color: white;
        }
        
        .title-group h1 {
            color: white;
            font-size: 84px;
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1;
        }
        
        .title-group p {
            color: #94a3b8; /* Slate 400 */
            font-size: 32px;
            margin-top: 16px;
            font-weight: 500;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 32px;
            margin-top: auto;
            position: relative;
            z-index: 1;
        }
        
        .item {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            background: #2563eb;
            border-radius: 50%;
        }
        
        .item-text {
            color: white;
            font-size: 24px;
            font-weight: 600;
        }
        
        .footer {
            margin-top: 60px;
            color: #475569; /* Slate 600 */
            font-size: 20px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        
        .brand {
            color: #2563eb;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="accent"></div>
        
        <!-- Header -->
        <div class="header">
            <div class="icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                </svg>
            </div>
            <div class="title-group">
                <h1>Resolute Validator</h1>
                <p>Enterprise Account Verification Engine</p>
            </div>
        </div>
        
        <!-- Features -->
        <div class="grid">
            <div class="item">
                <div class="dot"></div>
                <span class="item-text">Batch CSV Processing (5,000+)</span>
            </div>
            <div class="item">
                <div class="dot"></div>
                <span class="item-text">Real-time Bank Integration</span>
            </div>
            <div class="item">
                <div class="dot"></div>
                <span class="item-text">Intelligent Name Matching</span>
            </div>
            <div class="item">
                <div class="dot"></div>
                <span class="item-text">Advanced Analytics Dashboard</span>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <span>Built for Modern Financial Workflows</span>
            <span class="brand">resolutevalidator.io</span>
        </div>
    </div>
</body>
</html>
